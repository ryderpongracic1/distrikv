services:
  node1:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    environment:
      NODE_ID: node1
      HTTP_ADDR: ":8001"
      GRPC_ADDR: ":9001"
      WAL_PATH: /data/wal.log
      DATA_DIR: /data
      PEERS: "node2=node2:9002,node3=node3:9003"
    ports:
      - "8001:8001"
      - "9001:9001"
    volumes:
      - node1-data:/data

  node2:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    environment:
      NODE_ID: node2
      HTTP_ADDR: ":8002"
      GRPC_ADDR: ":9002"
      WAL_PATH: /data/wal.log
      DATA_DIR: /data
      PEERS: "node1=node1:9001,node3=node3:9003"
    ports:
      - "8002:8002"
      - "9002:9002"
    volumes:
      - node2-data:/data

  node3:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    environment:
      NODE_ID: node3
      HTTP_ADDR: ":8003"
      GRPC_ADDR: ":9003"
      WAL_PATH: /data/wal.log
      DATA_DIR: /data
      PEERS: "node1=node1:9001,node2=node2:9002"
    ports:
      - "8003:8003"
      - "9003:9003"
    volumes:
      - node3-data:/data

volumes:
  node1-data:
  node2-data:
  node3-data:
