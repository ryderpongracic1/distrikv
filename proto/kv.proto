syntax = "proto3";

package kv;

option go_package = "github.com/ryderpongracic1/distrikv/proto/kvpb";

// KVService is the inter-node RPC interface. All peer-to-peer communication
// goes through this service: client request forwarding, write replication,
// Raft leader election, and Raft heartbeating.
service KVService {
  // ForwardKey proxies a client request from a non-owning node to the
  // consistent-hash ring owner.
  rpc ForwardKey(ForwardKeyRequest) returns (ForwardKeyResponse);

  // Replicate copies a committed mutation from the ring-primary to a replica.
  rpc Replicate(ReplicateRequest) returns (ReplicateResponse);

  // RequestVote is the Raft leader-election RPC (§5.2 of the Raft paper).
  rpc RequestVote(RequestVoteRequest) returns (RequestVoteResponse);

  // AppendEntries serves as both the Raft heartbeat and the log-replication
  // RPC (§5.3). An empty Entries slice is a pure heartbeat.
  rpc AppendEntries(AppendEntriesRequest) returns (AppendEntriesResponse);
}

// ---------------------------------------------------------------------------
// ForwardKey
// ---------------------------------------------------------------------------

message ForwardKeyRequest {
  string method = 1; // "PUT", "GET", or "DELETE"
  string key    = 2;
  bytes  value  = 3; // empty for GET and DELETE
}

message ForwardKeyResponse {
  int32 status_code = 1;
  bytes body        = 2;
}

// ---------------------------------------------------------------------------
// Replicate
// ---------------------------------------------------------------------------

message ReplicateRequest {
  string op    = 1; // "put" or "delete"
  string key   = 2;
  bytes  value = 3; // empty for delete
  uint64 term  = 4; // Raft term at the time of the write
}

message ReplicateResponse {
  bool   success = 1;
  string node_id = 2;
}

// ---------------------------------------------------------------------------
// Raft: RequestVote
// ---------------------------------------------------------------------------

message RequestVoteRequest {
  uint64 term           = 1;
  string candidate_id   = 2;
  uint64 last_log_index = 3;
  uint64 last_log_term  = 4;
}

message RequestVoteResponse {
  uint64 term         = 1;
  bool   vote_granted = 2;
}

// ---------------------------------------------------------------------------
// Raft: AppendEntries (heartbeat + log replication)
// ---------------------------------------------------------------------------

message AppendEntriesRequest {
  uint64   term          = 1;
  string   leader_id     = 2;
  uint64   prev_log_index = 3;
  uint64   prev_log_term  = 4;
  repeated LogEntry entries = 5; // empty slice == heartbeat
  uint64   leader_commit  = 6;
}

message AppendEntriesResponse {
  uint64 term    = 1;
  bool   success = 2;
}

// ---------------------------------------------------------------------------
// Shared types
// ---------------------------------------------------------------------------

// LogEntry is a single record in the Raft log.
message LogEntry {
  uint64 index = 1;
  uint64 term  = 2;
  string op    = 3; // "put" or "delete"
  string key   = 4;
  bytes  value = 5;
}
